syntax = "proto3";

package resc.video;

// Shared codec enums used by both control.proto (protobuf) and binary UDP headers.
// The actual video frames are sent as binary UDP packets (NOT protobuf).
// This file provides the canonical enum values for reference and for any
// protobuf messages that need to reference codec types.
//
// Protocol Constants (v1) — for human reference; implemented as code constants:
//   PROTOCOL_VERSION              = 1
//   MAX_DATAGRAM_BYTES            = 1400
//   PACKET_PREFIX_BYTES           = 6    (magic[4] + version[1] + packet_type[1])
//   VIDEO_CHUNK_HEADER_BYTES      = 32   (per-packet[12] + per-frame[20])
//   VIDEO_TOTAL_HEADER_BYTES      = 38   (PACKET_PREFIX_BYTES + VIDEO_CHUNK_HEADER_BYTES)
//   MAX_VIDEO_PAYLOAD_BYTES       = 1362 (MAX_DATAGRAM_BYTES - VIDEO_TOTAL_HEADER_BYTES)
//   CURSOR_UPDATE_BYTES           = 29
//   CURSOR_TOTAL_PACKET_BYTES     = 35   (PACKET_PREFIX_BYTES + CURSOR_UPDATE_BYTES)
//
// PacketPrefix (6 bytes, all UDP packets):
//   magic:       [u8; 4]  = b"RESC"
//   version:     u8       = PROTOCOL_VERSION
//   packet_type: u8       = 0=video_chunk, 1=cursor_update, 2=input_event
//
// VideoChunkHeader (32 bytes, after PacketPrefix):
//   Per-packet (always valid):
//     stream_id:    u32
//     config_id:    u32
//     frame_id:     u32
//     chunk_id:     u16
//     chunk_size:   u16
//   Per-frame (valid when chunk_id==0; zero-filled otherwise):
//     timestamp_us: u64
//     is_keyframe:  u8   (0 or 1)
//     codec:        u8   (0=H.264, 1=HEVC)
//     width:        u16
//     height:       u16
//     total_chunks: u16
//     total_bytes:  u32
//
// Codec and CodecProfile enums are defined in control.proto to avoid duplication.
// Import from there if needed.
